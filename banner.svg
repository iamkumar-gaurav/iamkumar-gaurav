<svg width="100%" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Kumar Gaurav – Data &amp; Analytics</title>
  <desc>Profile banner for Kumar Gaurav, Data and Analytics professional</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c6dfa"/>
      <stop offset="50%" stop-color="#29d9c2"/>
